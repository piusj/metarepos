name: verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Snapshot committed dist
        run: cp -r dist .dist-committed

      - name: Rebuild dist from source
        run: rm -rf dist && npm run build

      - name: Verify committed dist matches a fresh build
        run: |
          if ! diff -qr .dist-committed dist >/dev/null 2>&1; then
            echo "::error::Committed dist/ does not match a fresh build from source."
            echo ""
            echo "Differences:"
            diff -r .dist-committed dist || true
            echo ""
            echo "Run 'npm run build' locally, commit the updated dist/, and push."
            exit 1
          fi
          echo "Committed dist matches a fresh build from source."
